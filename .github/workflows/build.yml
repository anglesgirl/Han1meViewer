name: Build and Release APK

on:
  push:
    branches: [ ech-support-v2, ech-support ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build ECH proxy binary (Go -> arm64-v8a)
        run: |
          cd proxy
          mkdir -p ../app/src/main/jniLibs/arm64-v8a
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -trimpath -o ../app/src/main/jniLibs/arm64-v8a/libechproxy.so .
          ls -lh ../app/src/main/jniLibs/arm64-v8a/libechproxy.so

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK (arm64-v8a only)
        run: ./gradlew :app:assembleRelease --no-daemon -x lint

      - name: Rename APK
        run: |
          mkdir -p output
          find app/build/outputs/apk/release/ -name "*.apk" | head -1 | xargs -I{} cp {} output/han1me-ech-arm64.apk
          ls -lh output/

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.2.0-ech
          name: Han1meViewer v3.2.0 (上游同步 26.2.1 + ECH 自动启动)
          body: |
            ## Han1meViewer v3.2.0 — 上游同步 26.2.1 + ECH 自动启动

            ### 同步上游 26.2.1
            - 同步上游 daisukiKaffuChino/Han1meViewer 最新代码
            - 包含 Cloudflare 验证 Cookie 主机隔离、并发等待、取消与超时处理
            - UI 组件统一重构，视频详情页交互优化
            - 修复校验签名误报问题

            ### ECH 功能
            - **自动启动**：应用启动时自动启动 ECH 代理，无需手动操作
            - **动态域名**：自动为所有已知域名预取 ECH 配置
            - **Go ECH 代理**：基于 Go 1.23 原生 ECH 支持，SNI 加密
            - **通用前置代理**：支持标准 HTTP CONNECT，其他 app 可设置代理为 `127.0.0.1:18423`
            - **Cloudflare Gateway DoH**：DoH 端点 `https://0kbpekmcr1.cloudflare-gateway.com/dns-query`
            - **ECH 配置共享**：无 ECH 记录的域名回退到 store.ubisoft.com 的共享配置

            ### 签名校验
            - 已禁用上游的签名校验（fork 版本使用 debug key）
          files: |
            output/han1me-ech-arm64.apk
          prerelease: false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: han1me-ech-arm64
          path: output/*.apk
          retention-days: 30
