permissions:
  contents: write
name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Load Google Services File
        env:
          DATA: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$DATA" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 not set, using placeholder"
            printf '{"project_info":{"project_number":"000000000000","project_id":"placeholder","storage_bucket":"placeholder.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.yenaly.han1meviewer"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],"services":{}},{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.yenaly.han1meviewer.debug"}},"oauth_client":[],"api_key":[{"current_key":"AIzaSyAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"}],"services":{}}],"configuration_version":"1"}' > app/google-services.json
          else
            echo $DATA | base64 -di > app/google-services.json
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug
        env:
          HA1_VERSION_SOURCE: 'ci'

      - name: Rename APK
        run: |
          cd app/build/outputs/apk/debug/
          ls -la *.apk
          cp *.apk Han1meViewer-ECH-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Han1meViewer-ECH-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ECH-v1.0
          name: Han1meViewer ECH 支持
          body: |
            ## ECH (Encrypted Client Hello) 支持

            通过集成 Cronet 网络栈加密 TLS ClientHello 中的 SNI，防止基于 SNI 的网络屏蔽。

            ### 功能
            - ECH 加密 SNI（默认开启）
            - DoH 配合 ECH 自动协商
            - 无 Google Play Services 时自动回退到 OkHttp
            - 设置 > 网络中可开关 ECH

            ### 下载
            直接下载下方 APK 安装即可。
          files: app/build/outputs/apk/debug/Han1meViewer-ECH-debug.apk
          prerelease: false
